<!DOCTYPE html>
<html>
<head>
    <title>Spam Shield AI</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* BACKGROUND */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: -1;
        }

        /* CARD */
        .card {
            position: relative;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            width: 420px;
            color: white;
            box-shadow: 0 0 40px rgba(0,255,255,0.2);
            margin: auto;
            top: 50%;
            transform: translateY(-50%);
            animation: fadeIn 1s ease;
            border: 1px solid rgba(0,255,255,0.3);
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(-50%);}
        }

        /* LOGO */
        .logo {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #00ffff;
            text-shadow:
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff;
        }

        .tagline {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
            margin-bottom: 25px;
            color: #ccc;
        }

        /* INPUT */
        input {
            padding: 12px;
            width: 70%;
            border-radius: 10px;
            border: none;
            outline: none;
            background: #111;
            color: #00ffff;
            border: 1px solid #00ffff;
        }

        input:focus {
            box-shadow: 0 0 15px #00ffff;
        }

        /* BUTTON */
        button {
            padding: 12px 18px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            color: white;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #ff00cc;
        }

        /* RESULT */
        #result {
            margin-top: 30px;
            font-size: 24px;
            font-weight: bold;
            min-height: 30px;
        }

        .spam {
            color: #ff0033;
            text-shadow: 0 0 15px #ff0033;
            animation: glitch 0.3s;
        }

        .notspam {
            color: #00ffcc;
            text-shadow: 0 0 15px #00ffcc;
            animation: pulse 0.5s;
        }

        /* ANIMATIONS */
        @keyframes pulse {
            from {transform: scale(0.9);}
            to {transform: scale(1);}
        }

        @keyframes glitch {
            0% {transform: translate(0);}
            20% {transform: translate(-2px,2px);}
            40% {transform: translate(2px,-2px);}
            60% {transform: translate(-2px,2px);}
            80% {transform: translate(2px,-2px);}
            100% {transform: translate(0);}
        }

        /* LOADER */
        .loader {
            border: 4px solid #111;
            border-top: 4px solid #00ffff;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

<div id="particles-js"></div>

<div class="card">

    <h1 id="logo" class="logo"></h1>
    <p class="tagline">Cyber AI Detection System</p>

    <input type="text" id="message" placeholder="Enter message...">
    <button onclick="checkSpam()">Scan</button>

    <div id="loader"></div>
    <p id="result"></p>

</div>

<script>
/* TYPEWRITER */
const text = "⚡ SPAM SHIELD AI ⚡";
let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("logo").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 60);
    }
}
typeEffect();

/* MAIN FUNCTION */
function checkSpam() {
    let text = document.getElementById("message").value;
    let resultElement = document.getElementById("result");
    let loader = document.getElementById("loader");

    resultElement.innerText = "";
    resultElement.className = "";

    loader.innerHTML = '<div class="loader"></div>';

    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({text: text})
    })
    .then(res => res.json())
    .then(data => {
        loader.innerHTML = "";
        resultElement.innerText = data.result;

        if (data.result.includes("Spam")) {
            resultElement.className = "spam";
        } else {
            resultElement.className = "notspam";
        }
    });
}

/* ENTER KEY */
document.getElementById("message").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        checkSpam();
    }
});
</script>

<!-- PARTICLES -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 120 },
    size: { value: 3 },
    move: { speed: 3 },
    line_linked: { enable: true },
    color: { value: "#00ffff" }
  }
});
</script>

</body>
</html>
